name: Deploy Backend (Dev)

on:
    pull_request:
        branches: [main]
        types: [labeled]

jobs:
    deploy:
        if: github.event.label.name == 'deploy in staging'
        runs-on: ubuntu-latest
        env:
            MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
            MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
            POSTGRES_USERNAME: ${{ secrets.POSTGRES_USERNAME_DEV }}
            POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_DEV }}
            POSTGRES_HOST: ${{ secrets.POSTGRES_HOST_DEV }}
            POSTGRES_PORT: ${{ secrets.POSTGRES_PORT_DEV }}
            POSTGRES_DATABASE: ${{ secrets.POSTGRES_DATABASE_DEV }}

        steps:
            - name: Check if labeled on develop branch
              id: check-branch
              run: |
                if [[ "${{ github.event.pull_request.head.ref }}" != "develop" ]]; then
                    echo "PR not on develop branch. Exiting."
                    exit 1
                fi

            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.11'

            - name: Install Dependencies
              run: |
                python -m pip install --upgrade pip
                make install-backend-dev

            - name: Lint Check
              run: |
                make check-backend

            - name: Run Migrations
              run: |
                make migrate-backend

            - name: Deploy
              run: |
                make deploy-backend-dev
