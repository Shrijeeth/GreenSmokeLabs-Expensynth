name: Deploy Backend (Prod)

on:
    push:
        branches: [main]

jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
            MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
            MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
            POSTGRES_USERNAME: ${{ secrets.POSTGRES_USERNAME_PROD }}
            POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_PROD }}
            POSTGRES_HOST: ${{ secrets.POSTGRES_HOST_PROD }}
            POSTGRES_PORT: ${{ secrets.POSTGRES_PORT_PROD }}
            POSTGRES_DATABASE: ${{ secrets.POSTGRES_DATABASE_PROD }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.11'

            - name: Install Dependencies
              run: |
                python -m pip install --upgrade pip
                make install-backend-dev

            - name: Lint Check
              run: |
                make check-backend

            - name: Run Migrations
              run: |
                make migrate-backend

            - name: Deploy
              run: |
                make deploy-backend-prod
